<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ch08 — Stateful vs Stateless Visualization</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0d1117;
    color: #c9d1d9;
    font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
    min-height: 100vh;
    padding: 24px;
  }

  h1 {
    text-align: center;
    font-size: 1.4rem;
    color: #58a6ff;
    margin-bottom: 4px;
  }

  .subtitle {
    text-align: center;
    font-size: 0.85rem;
    color: #8b949e;
    margin-bottom: 24px;
  }

  /* Controls */
  .controls {
    display: flex;
    justify-content: center;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }

  button {
    background: #21262d;
    border: 1px solid #30363d;
    color: #c9d1d9;
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.8rem;
    transition: all 0.15s;
  }

  button:hover { background: #30363d; border-color: #58a6ff; }
  button.active { background: #1f6feb; border-color: #58a6ff; color: #fff; }
  button.danger { border-color: #f85149; }
  button.danger:hover { background: #da3633; color: #fff; }

  /* Layout */
  .arena {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
    position: relative;
    max-width: 900px;
    margin: 0 auto;
  }

  /* Clients */
  .clients-row {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .client {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 0.75rem;
    text-align: center;
    width: 90px;
    position: relative;
  }

  .client .icon { font-size: 1.4rem; margin-bottom: 4px; }
  .client .name { color: #c9d1d9; font-weight: 600; }
  .client .status {
    font-size: 0.65rem;
    margin-top: 4px;
    color: #8b949e;
    min-height: 1.2em;
  }

  /* Load Balancer */
  .load-balancer {
    background: #161b22;
    border: 2px solid #58a6ff;
    border-radius: 10px;
    padding: 12px 28px;
    text-align: center;
    position: relative;
  }

  .load-balancer .label {
    font-size: 0.85rem;
    font-weight: 700;
    color: #58a6ff;
  }

  .load-balancer .strategy {
    font-size: 0.7rem;
    color: #8b949e;
    margin-top: 2px;
  }

  /* Servers */
  .servers-row {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .server {
    background: #161b22;
    border: 2px solid #30363d;
    border-radius: 10px;
    padding: 14px;
    width: 200px;
    position: relative;
    transition: border-color 0.3s, opacity 0.3s;
  }

  .server.dead {
    opacity: 0.35;
    border-color: #f85149;
    border-style: dashed;
  }

  .server .server-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }

  .server .server-name {
    font-weight: 700;
    font-size: 0.85rem;
    color: #58a6ff;
  }

  .server .server-pid {
    font-size: 0.65rem;
    color: #8b949e;
  }

  .server .state-section {
    margin-top: 8px;
    min-height: 40px;
  }

  .server .state-label {
    font-size: 0.65rem;
    color: #8b949e;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }

  .server .state-dots {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }

  .state-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    transition: all 0.3s;
  }

  .state-dot.session { background: #f0883e; }
  .state-dot.websocket { background: #a371f7; }
  .state-dot.sse { background: #3fb950; }

  .server .conn-count {
    font-size: 0.7rem;
    color: #8b949e;
    margin-top: 6px;
  }

  /* Messages flying */
  .message-fly {
    position: absolute;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    pointer-events: none;
    z-index: 100;
    transition: none;
  }

  .message-fly.success { background: #3fb950; box-shadow: 0 0 8px #3fb950; }
  .message-fly.fail { background: #f85149; box-shadow: 0 0 8px #f85149; }

  /* Log */
  .log-panel {
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 12px;
    max-width: 900px;
    margin: 24px auto 0;
    max-height: 240px;
    overflow-y: auto;
    font-size: 0.72rem;
  }

  .log-panel .log-title {
    font-size: 0.8rem;
    color: #58a6ff;
    margin-bottom: 8px;
    font-weight: 700;
  }

  .log-entry {
    padding: 2px 0;
    border-bottom: 1px solid #21262d;
    display: flex;
    gap: 8px;
  }

  .log-entry .log-time { color: #484f58; min-width: 60px; }
  .log-entry .log-ok { color: #3fb950; }
  .log-entry .log-fail { color: #f85149; }
  .log-entry .log-info { color: #8b949e; }

  /* Stats */
  .stats-bar {
    display: flex;
    justify-content: center;
    gap: 32px;
    margin-top: 16px;
    font-size: 0.8rem;
  }

  .stat { text-align: center; }
  .stat .stat-value { font-size: 1.4rem; font-weight: 700; }
  .stat .stat-label { font-size: 0.7rem; color: #8b949e; }
  .stat-value.green { color: #3fb950; }
  .stat-value.red { color: #f85149; }

  /* Legend */
  .legend {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 12px;
    font-size: 0.7rem;
    color: #8b949e;
  }

  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    display: inline-block;
  }
</style>
</head>
<body>

<h1>Chapter 08 — Stateful vs Stateless</h1>
<p class="subtitle">FoodDash: What happens when you add a second server?</p>

<div class="controls">
  <button id="btn-stateless" class="active" onclick="setMode('stateless')">Stateless Mode</button>
  <button id="btn-stateful" onclick="setMode('stateful')">Stateful Mode</button>
  <span style="color:#30363d; line-height:2.4">|</span>
  <button onclick="sendRequest()">Send Request</button>
  <button onclick="sendBurst()">Send 10 Requests</button>
  <span style="color:#30363d; line-height:2.4">|</span>
  <button onclick="addServer()">Add Server</button>
  <button onclick="removeServer()">Remove Server</button>
  <button class="danger" onclick="killServer()">Kill Server</button>
  <span style="color:#30363d; line-height:2.4">|</span>
  <button onclick="resetAll()">Reset</button>
</div>

<div class="arena" id="arena">
  <!-- Clients -->
  <div class="clients-row" id="clients-row"></div>

  <!-- Load Balancer -->
  <div class="load-balancer">
    <div class="label">Load Balancer</div>
    <div class="strategy" id="lb-strategy">Round Robin</div>
  </div>

  <!-- Servers -->
  <div class="servers-row" id="servers-row"></div>
</div>

<div class="stats-bar">
  <div class="stat">
    <div class="stat-value green" id="stat-success">0</div>
    <div class="stat-label">Successful</div>
  </div>
  <div class="stat">
    <div class="stat-value red" id="stat-fail">0</div>
    <div class="stat-label">Failed</div>
  </div>
  <div class="stat">
    <div class="stat-value" style="color:#58a6ff" id="stat-total">0</div>
    <div class="stat-label">Total</div>
  </div>
</div>

<div class="legend">
  <div class="legend-item"><span class="legend-dot" style="background:#f0883e"></span> Session</div>
  <div class="legend-item"><span class="legend-dot" style="background:#a371f7"></span> WebSocket</div>
  <div class="legend-item"><span class="legend-dot" style="background:#3fb950"></span> SSE Stream</div>
  <div class="legend-item"><span class="legend-dot" style="background:#3fb950"></span> Success</div>
  <div class="legend-item"><span class="legend-dot" style="background:#f85149"></span> Failure</div>
</div>

<div class="log-panel" id="log-panel">
  <div class="log-title">Event Log</div>
</div>

<script>
// ---------------------------------------------------------------
// State
// ---------------------------------------------------------------
let mode = 'stateless'; // 'stateless' | 'stateful'
let serverIdCounter = 0;
let clientIdCounter = 0;
let rrIndex = 0; // round-robin index
let stats = { success: 0, fail: 0, total: 0 };

// Servers: { id, name, alive, sessions: Set, websockets: Set, sseStreams: Set }
let servers = [];
// Clients: { id, name, sessionServer: serverId | null }
let clients = [];

function init() {
  servers = [];
  clients = [];
  serverIdCounter = 0;
  clientIdCounter = 0;
  rrIndex = 0;
  stats = { success: 0, fail: 0, total: 0 };

  addServerInternal();
  addServerInternal();

  addClientInternal('Alice');
  addClientInternal('Bob');
  addClientInternal('Carol');
  addClientInternal('Dave');

  // In stateful mode, assign initial sessions
  if (mode === 'stateful') {
    assignInitialSessions();
  }

  render();
  updateStats();
  clearLog();
  log('info', `Initialized in ${mode} mode with ${servers.length} servers and ${clients.length} clients`);
}

function addServerInternal() {
  serverIdCounter++;
  const s = {
    id: serverIdCounter,
    name: `Server ${serverIdCounter}`,
    alive: true,
    pid: 10000 + Math.floor(Math.random() * 50000),
    sessions: new Set(),
    websockets: new Set(),
    sseStreams: new Set(),
  };
  servers.push(s);
  return s;
}

function addClientInternal(name) {
  clientIdCounter++;
  const c = { id: clientIdCounter, name: name || `Client ${clientIdCounter}`, sessionServer: null };
  clients.push(c);
  return c;
}

function assignInitialSessions() {
  clients.forEach((c, i) => {
    const server = servers[i % servers.length];
    if (server && server.alive) {
      c.sessionServer = server.id;
      server.sessions.add(c.id);
      // Add some stateful connections
      if (i % 2 === 0) server.websockets.add(c.id);
      if (i % 3 === 0) server.sseStreams.add(c.id);
    }
  });
}

// ---------------------------------------------------------------
// Rendering
// ---------------------------------------------------------------
function render() {
  renderClients();
  renderServers();
  document.getElementById('lb-strategy').textContent =
    mode === 'stateless' ? 'Round Robin' : 'Round Robin (no affinity)';
}

function renderClients() {
  const row = document.getElementById('clients-row');
  row.innerHTML = '';
  clients.forEach(c => {
    const div = document.createElement('div');
    div.className = 'client';
    div.id = `client-${c.id}`;
    const icons = ['&#x1F464;', '&#x1F468;', '&#x1F469;', '&#x1F9D1;'];
    div.innerHTML = `
      <div class="icon">${icons[(c.id - 1) % icons.length]}</div>
      <div class="name">${c.name}</div>
      <div class="status" id="client-status-${c.id}">
        ${mode === 'stateful' && c.sessionServer ? `Session on S${c.sessionServer}` : ''}
      </div>
    `;
    row.appendChild(div);
  });
}

function renderServers() {
  const row = document.getElementById('servers-row');
  row.innerHTML = '';
  servers.forEach(s => {
    const div = document.createElement('div');
    div.className = 'server' + (s.alive ? '' : ' dead');
    div.id = `server-${s.id}`;

    let stateHtml = '';
    if (mode === 'stateful') {
      const sessionDots = Array.from(s.sessions).map(() => '<span class="state-dot session"></span>').join('');
      const wsDots = Array.from(s.websockets).map(() => '<span class="state-dot websocket"></span>').join('');
      const sseDots = Array.from(s.sseStreams).map(() => '<span class="state-dot sse"></span>').join('');
      stateHtml = `
        <div class="state-section">
          <div class="state-label">In-Memory State</div>
          <div class="state-dots">${sessionDots}${wsDots}${sseDots}</div>
          <div class="conn-count">
            ${s.sessions.size} sessions, ${s.websockets.size} WS, ${s.sseStreams.size} SSE
          </div>
        </div>
      `;
    } else {
      stateHtml = `
        <div class="state-section">
          <div class="state-label">Server State</div>
          <div style="font-size:0.7rem; color:#3fb950; margin-top:4px;">
            No per-client state<br>
            JWT verified per request<br>
            Any request welcome
          </div>
        </div>
      `;
    }

    div.innerHTML = `
      <div class="server-header">
        <span class="server-name">${s.name}</span>
        <span class="server-pid">${s.alive ? 'PID ' + s.pid : 'DEAD'}</span>
      </div>
      ${stateHtml}
    `;
    row.appendChild(div);
  });
}

// ---------------------------------------------------------------
// Actions
// ---------------------------------------------------------------
function setMode(m) {
  mode = m;
  document.getElementById('btn-stateless').className = m === 'stateless' ? 'active' : '';
  document.getElementById('btn-stateful').className = m === 'stateful' ? 'active' : '';
  init();
}

function getAliveServers() {
  return servers.filter(s => s.alive);
}

function pickServer() {
  const alive = getAliveServers();
  if (alive.length === 0) return null;
  const s = alive[rrIndex % alive.length];
  rrIndex++;
  return s;
}

function sendRequest() {
  const alive = getAliveServers();
  if (alive.length === 0) {
    log('fail', 'No servers alive! All requests fail.');
    return;
  }

  // Pick a random client
  const client = clients[Math.floor(Math.random() * clients.length)];
  const server = pickServer();

  stats.total++;

  if (mode === 'stateless') {
    // Stateless: always succeeds on any alive server
    stats.success++;
    highlightRequest(client, server, true);
    log('ok', `${client.name} -> ${server.name}: JWT verified. Request served. (any server works)`);
  } else {
    // Stateful: only succeeds if client's session is on this server
    if (client.sessionServer === server.id) {
      stats.success++;
      highlightRequest(client, server, true);
      log('ok', `${client.name} -> ${server.name}: Session found! Request served.`);
    } else if (client.sessionServer === null) {
      // New session created here
      client.sessionServer = server.id;
      server.sessions.add(client.id);
      stats.success++;
      highlightRequest(client, server, true);
      log('ok', `${client.name} -> ${server.name}: New session created on ${server.name}.`);
      render();
    } else {
      // Session is on a different server
      const origServer = servers.find(s => s.id === client.sessionServer);
      const origName = origServer ? origServer.name : `Server ${client.sessionServer} (dead)`;
      stats.fail++;
      highlightRequest(client, server, false);
      log('fail', `${client.name} -> ${server.name}: 401 — Session exists on ${origName}, not here!`);
    }
  }

  updateStats();
}

function sendBurst() {
  for (let i = 0; i < 10; i++) {
    setTimeout(() => sendRequest(), i * 200);
  }
}

function addServer() {
  const s = addServerInternal();
  log('info', `${s.name} added to the pool (PID ${s.pid})`);
  if (mode === 'stateless') {
    log('info', `${s.name} ready immediately — no state to migrate.`);
  } else {
    log('info', `${s.name} has 0 sessions. Existing sessions stay on their original servers.`);
  }
  render();
}

function removeServer() {
  const alive = getAliveServers();
  if (alive.length <= 1) {
    log('fail', 'Cannot remove the last server.');
    return;
  }
  const server = alive[alive.length - 1];
  servers = servers.filter(s => s.id !== server.id);

  if (mode === 'stateless') {
    log('info', `${server.name} removed. No impact — requests route to remaining servers.`);
  } else {
    const lostSessions = server.sessions.size;
    const lostWs = server.websockets.size;
    // Clear client session pointers
    clients.forEach(c => {
      if (c.sessionServer === server.id) c.sessionServer = null;
    });
    if (lostSessions > 0 || lostWs > 0) {
      log('fail', `${server.name} removed. ${lostSessions} sessions and ${lostWs} WebSocket connections LOST.`);
    } else {
      log('info', `${server.name} removed gracefully (no active sessions).`);
    }
  }
  render();
}

function killServer() {
  const alive = getAliveServers();
  if (alive.length === 0) {
    log('fail', 'No servers to kill.');
    return;
  }
  // Kill a random alive server
  const idx = Math.floor(Math.random() * alive.length);
  const server = alive[idx];
  server.alive = false;

  if (mode === 'stateless') {
    log('info', `${server.name} crashed! Load balancer detects failure, routes around it.`);
    log('ok', `No state lost. Remaining servers handle all requests.`);
  } else {
    const lostSessions = server.sessions.size;
    const lostWs = server.websockets.size;
    const lostSse = server.sseStreams.size;
    const total = lostSessions + lostWs + lostSse;

    clients.forEach(c => {
      if (c.sessionServer === server.id) {
        // Session is lost but client still thinks it's there
        // This will cause failures when they try to use it
      }
    });

    log('fail', `${server.name} CRASHED! PID ${server.pid} terminated.`);
    if (total > 0) {
      log('fail', `LOST: ${lostSessions} sessions, ${lostWs} WebSocket connections, ${lostSse} SSE streams.`);
      log('fail', `Affected clients must re-authenticate and reconnect.`);
    }
  }
  render();
}

function resetAll() {
  init();
}

// ---------------------------------------------------------------
// Visual effects
// ---------------------------------------------------------------
function highlightRequest(client, server, success) {
  const clientEl = document.getElementById(`client-${client.id}`);
  const serverEl = document.getElementById(`server-${server.id}`);
  if (!clientEl || !serverEl) return;

  const color = success ? '#3fb950' : '#f85149';
  clientEl.style.borderColor = color;
  serverEl.style.borderColor = color;

  setTimeout(() => {
    clientEl.style.borderColor = '#30363d';
    serverEl.style.borderColor = server.alive ? '#30363d' : '#f85149';
  }, 400);

  // Update client status briefly
  const statusEl = document.getElementById(`client-status-${client.id}`);
  if (statusEl) {
    const origText = statusEl.textContent;
    statusEl.textContent = success ? `OK -> ${server.name}` : `FAIL -> ${server.name}`;
    statusEl.style.color = color;
    setTimeout(() => {
      statusEl.textContent = origText;
      statusEl.style.color = '#8b949e';
    }, 1500);
  }
}

// ---------------------------------------------------------------
// Logging
// ---------------------------------------------------------------
function log(level, message) {
  const panel = document.getElementById('log-panel');
  const entry = document.createElement('div');
  entry.className = 'log-entry';

  const now = new Date();
  const time = `${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}.${now.getMilliseconds().toString().padStart(3,'0')}`;

  const levelClass = level === 'ok' ? 'log-ok' : level === 'fail' ? 'log-fail' : 'log-info';
  const prefix = level === 'ok' ? '[OK]  ' : level === 'fail' ? '[FAIL]' : '[INFO]';

  entry.innerHTML = `
    <span class="log-time">${time}</span>
    <span class="${levelClass}">${prefix}</span>
    <span>${message}</span>
  `;
  panel.appendChild(entry);
  panel.scrollTop = panel.scrollHeight;
}

function clearLog() {
  const panel = document.getElementById('log-panel');
  panel.innerHTML = '<div class="log-title">Event Log</div>';
}

function updateStats() {
  document.getElementById('stat-success').textContent = stats.success;
  document.getElementById('stat-fail').textContent = stats.fail;
  document.getElementById('stat-total').textContent = stats.total;
}

// ---------------------------------------------------------------
// Init
// ---------------------------------------------------------------
init();
</script>
</body>
</html>
