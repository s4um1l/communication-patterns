<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FoodDash — Restaurant Dashboard (SSE)</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #242836;
    --border: #2e3347;
    --text: #e4e6f0;
    --text-dim: #8b8fa3;
    --accent: #6c8cff;
    --accent-glow: rgba(108, 140, 255, 0.3);
    --green: #4ade80;
    --green-glow: rgba(74, 222, 128, 0.3);
    --orange: #fb923c;
    --red: #f87171;
    --yellow: #fbbf24;
    --purple: #a78bfa;
    --font-mono: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-sans);
    min-height: 100vh;
    padding: 1.5rem;
  }

  /* Header */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.5rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--border);
  }

  .header h1 {
    font-size: 1.4rem;
    font-weight: 600;
  }

  .header .subtitle {
    color: var(--text-dim);
    font-size: 0.8rem;
    margin-top: 0.2rem;
  }

  /* Connection status */
  .conn-status {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-family: var(--font-mono);
    font-size: 0.8rem;
    padding: 0.5rem 1rem;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface);
  }

  .conn-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--text-dim);
  }

  .conn-dot.connected {
    background: var(--green);
    box-shadow: 0 0 8px var(--green-glow);
    animation: pulse 2s infinite;
  }

  .conn-dot.reconnecting {
    background: var(--yellow);
    animation: blink 0.8s infinite;
  }

  .conn-dot.disconnected {
    background: var(--red);
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }

  /* Controls */
  .controls {
    display: flex;
    gap: 0.75rem;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
    align-items: center;
  }

  .btn {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 0.5rem 1rem;
    border-radius: 6px;
    font-size: 0.85rem;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s, box-shadow 0.2s;
    font-family: var(--font-sans);
  }
  .btn:hover { background: #5a7aef; box-shadow: 0 0 12px var(--accent-glow); }
  .btn.green { background: var(--green); color: #000; }
  .btn.green:hover { background: #3bcc6e; }
  .btn.orange { background: var(--orange); color: #000; }
  .btn.orange:hover { background: #e8842e; }

  .stats-bar {
    display: flex;
    gap: 1.5rem;
    margin-left: auto;
    font-family: var(--font-mono);
    font-size: 0.75rem;
    color: var(--text-dim);
  }

  .stats-bar .stat-val {
    color: var(--accent);
    font-weight: 600;
  }

  /* Layout: two columns */
  .layout {
    display: grid;
    grid-template-columns: 1fr 340px;
    gap: 1.5rem;
    max-width: 1200px;
  }

  /* Order cards */
  .orders-section h2 {
    font-size: 1rem;
    margin-bottom: 0.75rem;
    color: var(--text-dim);
    font-weight: 500;
  }

  .orders-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 0.75rem;
  }

  .order-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.85rem;
    transition: border-color 0.3s, box-shadow 0.3s;
    animation: slideIn 0.3s ease-out;
  }

  .order-card.new {
    border-color: var(--green);
    box-shadow: 0 0 16px var(--green-glow);
  }

  .order-card.updated {
    border-color: var(--accent);
    box-shadow: 0 0 12px var(--accent-glow);
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .order-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.5rem;
  }

  .order-id {
    font-family: var(--font-mono);
    font-size: 0.75rem;
    color: var(--text-dim);
  }

  .order-status {
    font-size: 0.7rem;
    font-weight: 600;
    padding: 0.15rem 0.5rem;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }

  .status-placed { background: rgba(108, 140, 255, 0.15); color: var(--accent); border: 1px solid var(--accent); }
  .status-confirmed { background: rgba(167, 139, 250, 0.15); color: var(--purple); border: 1px solid var(--purple); }
  .status-preparing { background: rgba(251, 191, 36, 0.15); color: var(--yellow); border: 1px solid var(--yellow); }
  .status-ready { background: rgba(74, 222, 128, 0.15); color: var(--green); border: 1px solid var(--green); }
  .status-picked_up { background: rgba(251, 146, 60, 0.15); color: var(--orange); border: 1px solid var(--orange); }
  .status-en_route { background: rgba(251, 146, 60, 0.15); color: var(--orange); border: 1px solid var(--orange); }
  .status-delivered { background: rgba(74, 222, 128, 0.25); color: var(--green); border: 1px solid var(--green); }
  .status-cancelled { background: rgba(248, 113, 113, 0.15); color: var(--red); border: 1px solid var(--red); }

  .order-customer {
    font-weight: 600;
    font-size: 0.95rem;
    margin-bottom: 0.4rem;
  }

  .order-items {
    font-size: 0.8rem;
    color: var(--text-dim);
    margin-bottom: 0.4rem;
  }

  .order-items li {
    list-style: none;
    padding: 0.1rem 0;
  }

  .order-total {
    font-family: var(--font-mono);
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--green);
  }

  .order-time {
    font-size: 0.7rem;
    color: var(--text-dim);
    margin-top: 0.3rem;
  }

  .empty-state {
    text-align: center;
    padding: 3rem;
    color: var(--text-dim);
    font-size: 0.9rem;
    background: var(--surface);
    border: 1px dashed var(--border);
    border-radius: 8px;
  }

  /* Event feed */
  .feed-section h2 {
    font-size: 1rem;
    margin-bottom: 0.75rem;
    color: var(--text-dim);
    font-weight: 500;
  }

  .event-feed {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    max-height: calc(100vh - 220px);
    overflow-y: auto;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    line-height: 1.6;
  }

  .feed-entry {
    padding: 0.4rem 0.7rem;
    border-bottom: 1px solid var(--border);
    animation: fadeIn 0.2s;
  }

  .feed-entry:last-child { border-bottom: none; }

  @keyframes fadeIn {
    from { opacity: 0; background: rgba(108, 140, 255, 0.1); }
    to { opacity: 1; background: transparent; }
  }

  .feed-time {
    color: var(--text-dim);
    margin-right: 0.5rem;
  }

  .feed-type {
    font-weight: 600;
    margin-right: 0.3rem;
  }

  .feed-type.order { color: var(--green); }
  .feed-type.status { color: var(--accent); }
  .feed-type.system { color: var(--yellow); }
  .feed-type.heartbeat { color: var(--text-dim); }

  .feed-data { color: var(--text-dim); }

  /* Protocol inspector */
  .protocol-section {
    margin-top: 1rem;
  }

  .protocol-section h3 {
    font-size: 0.8rem;
    color: var(--text-dim);
    margin-bottom: 0.5rem;
    font-weight: 500;
  }

  .raw-event {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.6rem;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    color: var(--green);
    white-space: pre;
    overflow-x: auto;
    max-height: 150px;
    overflow-y: auto;
  }

  .raw-field-event { color: var(--purple); }
  .raw-field-id { color: var(--yellow); }
  .raw-field-data { color: var(--green); }
  .raw-comment { color: var(--text-dim); }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>Burger Palace -- Restaurant Dashboard</h1>
    <div class="subtitle">Chapter 04: Real-time order feed via Server-Sent Events</div>
  </div>
  <div class="conn-status" id="connStatus">
    <span class="conn-dot" id="connDot"></span>
    <span id="connText">Disconnected</span>
  </div>
</div>

<div class="controls">
  <button class="btn green" id="connectBtn">Connect SSE Stream</button>
  <button class="btn" id="placeOrderBtn" disabled>Place Test Order</button>
  <button class="btn orange" id="advanceBtn" disabled>Advance Random Order</button>
  <div class="stats-bar">
    <span>Events: <span class="stat-val" id="eventCount">0</span></span>
    <span>Orders: <span class="stat-val" id="orderCount">0</span></span>
    <span>Last-Event-ID: <span class="stat-val" id="lastEventId">--</span></span>
  </div>
</div>

<div class="layout">
  <!-- Left: Order cards -->
  <div class="orders-section">
    <h2>Incoming Orders</h2>
    <div class="orders-grid" id="ordersGrid">
      <div class="empty-state" id="emptyState">
        No orders yet. Connect the SSE stream and place a test order.
      </div>
    </div>
  </div>

  <!-- Right: Event feed + protocol inspector -->
  <div>
    <div class="feed-section">
      <h2>Live Event Feed</h2>
      <div class="event-feed" id="eventFeed"></div>
    </div>

    <div class="protocol-section">
      <h3>Last Raw SSE Event</h3>
      <div class="raw-event" id="rawEvent">Waiting for events...</div>
    </div>
  </div>
</div>

<script>
(function() {
  // -----------------------------------------------------------------------
  // EventSource API — the core of SSE on the client side
  //
  // EventSource is a browser built-in. No library needed. It:
  //   1. Opens a GET request with Accept: text/event-stream
  //   2. Parses the incoming text stream into discrete events
  //   3. Dispatches events to registered listeners
  //   4. Automatically reconnects if the connection drops
  //   5. Sends Last-Event-ID header on reconnection for resumption
  //
  // The entire client-side SSE implementation is just:
  //   const source = new EventSource(url);
  //   source.addEventListener('eventType', handler);
  //
  // Compare this to WebSocket (manual reconnection, manual parsing)
  // or long polling (manual request loop, manual state tracking).
  // -----------------------------------------------------------------------

  let eventSource = null;
  let orders = {};  // order_id -> order data
  let eventCount = 0;
  let connectTime = null;

  // Customer names for test orders
  const CUSTOMER_NAMES = ['Alice', 'Bob', 'Carol', 'Dave', 'Eve', 'Frank', 'Grace'];
  const ITEM_COMBOS = [
    ['item_01'],
    ['item_02'],
    ['item_03'],
    ['item_01', 'item_02'],
    ['item_01', 'item_03'],
    ['item_02', 'item_03'],
    ['item_01', 'item_02', 'item_03'],
  ];

  // ---- Elements ----
  const connectBtn = document.getElementById('connectBtn');
  const placeOrderBtn = document.getElementById('placeOrderBtn');
  const advanceBtn = document.getElementById('advanceBtn');
  const connDot = document.getElementById('connDot');
  const connText = document.getElementById('connText');
  const eventCountEl = document.getElementById('eventCount');
  const orderCountEl = document.getElementById('orderCount');
  const lastEventIdEl = document.getElementById('lastEventId');
  const ordersGrid = document.getElementById('ordersGrid');
  const emptyState = document.getElementById('emptyState');
  const eventFeed = document.getElementById('eventFeed');
  const rawEvent = document.getElementById('rawEvent');

  // ---- Connection state ----
  function setConnectionState(state) {
    connDot.className = 'conn-dot ' + state;
    if (state === 'connected') {
      connText.textContent = 'Connected';
      connectBtn.textContent = 'Disconnect';
      placeOrderBtn.disabled = false;
      advanceBtn.disabled = false;
    } else if (state === 'reconnecting') {
      connText.textContent = 'Reconnecting...';
      connectBtn.textContent = 'Disconnect';
    } else {
      connText.textContent = 'Disconnected';
      connectBtn.textContent = 'Connect SSE Stream';
      placeOrderBtn.disabled = true;
      advanceBtn.disabled = true;
    }
  }

  // ---- Event feed ----
  function addFeedEntry(type, cls, text) {
    const entry = document.createElement('div');
    entry.className = 'feed-entry';
    const elapsed = connectTime ? ((Date.now() - connectTime) / 1000).toFixed(1) : '0.0';
    entry.innerHTML =
      `<span class="feed-time">[${elapsed}s]</span>` +
      `<span class="feed-type ${cls}">${type}</span> ` +
      `<span class="feed-data">${text}</span>`;
    eventFeed.prepend(entry);
    // Limit feed entries
    while (eventFeed.children.length > 100) {
      eventFeed.lastChild.remove();
    }
  }

  // ---- Raw event display ----
  function showRawEvent(eventType, id, data) {
    // Show what the raw SSE bytes look like on the wire.
    // This is the actual protocol — just text lines.
    let raw = '';
    if (eventType) raw += `<span class="raw-field-event">event: ${eventType}</span>\n`;
    if (id) raw += `<span class="raw-field-id">id: ${id}</span>\n`;
    if (data) {
      // Pretty-print JSON data
      try {
        const parsed = JSON.parse(data);
        data = JSON.stringify(parsed, null, 2);
      } catch (e) {}
      raw += `<span class="raw-field-data">data: ${escapeHtml(data)}</span>\n`;
    }
    raw += '\n';
    rawEvent.innerHTML = raw;
  }

  function escapeHtml(str) {
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  // ---- Order card management ----
  function addOrUpdateOrderCard(orderData, isNew) {
    const orderId = orderData.order_id;
    orders[orderId] = orderData;

    // Hide empty state
    if (emptyState.parentNode) {
      emptyState.style.display = 'none';
    }

    let card = document.getElementById('card-' + orderId);
    if (!card) {
      card = document.createElement('div');
      card.className = 'order-card' + (isNew ? ' new' : '');
      card.id = 'card-' + orderId;
      ordersGrid.prepend(card);
    } else {
      card.className = 'order-card updated';
    }

    const status = orderData.status;
    const itemsHtml = (orderData.items || [])
      .map(i => `<li>${i.name} x${i.quantity}</li>`)
      .join('');

    const timeStr = orderData.created_at
      ? new Date(orderData.created_at * 1000).toLocaleTimeString()
      : '';

    card.innerHTML =
      `<div class="order-header">` +
        `<span class="order-id">#${orderId}</span>` +
        `<span class="order-status status-${status}">${status}</span>` +
      `</div>` +
      `<div class="order-customer">${orderData.customer_name || 'Unknown'}</div>` +
      `<ul class="order-items">${itemsHtml}</ul>` +
      `<div class="order-total">$${((orderData.total_cents || 0) / 100).toFixed(2)}</div>` +
      `<div class="order-time">${timeStr}</div>`;

    // Remove highlight after animation
    setTimeout(() => {
      card.className = 'order-card';
    }, 1500);

    orderCountEl.textContent = Object.keys(orders).length;
  }

  function updateOrderStatus(orderId, newStatus) {
    if (orders[orderId]) {
      orders[orderId].status = newStatus;
      addOrUpdateOrderCard(orders[orderId], false);
    }
  }

  // ---- SSE Connection ----
  // This is where the EventSource API is used.
  // Notice how simple it is compared to implementing long polling.
  function connect() {
    if (eventSource) {
      disconnect();
      return;
    }

    connectTime = Date.now();
    setConnectionState('reconnecting');
    addFeedEntry('SYSTEM', 'system', 'Connecting to SSE stream...');

    // Create the EventSource. This is the ENTIRE client-side SSE setup.
    // The browser handles:
    //   - Opening the HTTP connection
    //   - Parsing the text/event-stream format
    //   - Dispatching events to our listeners
    //   - Automatic reconnection on disconnect
    //   - Sending Last-Event-ID on reconnection
    eventSource = new EventSource('/orders/stream');

    // --- Connection lifecycle events ---

    // onopen: fired when the connection is established
    eventSource.onopen = function() {
      setConnectionState('connected');
      addFeedEntry('SYSTEM', 'system', 'SSE stream connected');
    };

    // onerror: fired when the connection is lost or fails
    // EventSource automatically reconnects — we just update the UI
    eventSource.onerror = function(e) {
      if (eventSource.readyState === EventSource.CONNECTING) {
        // Browser is automatically reconnecting
        setConnectionState('reconnecting');
        addFeedEntry('SYSTEM', 'system',
          'Connection lost. EventSource is auto-reconnecting...');
      } else if (eventSource.readyState === EventSource.CLOSED) {
        // Connection closed permanently
        setConnectionState('disconnected');
        addFeedEntry('SYSTEM', 'system', 'Connection closed.');
      }
    };

    // --- Custom event listeners ---
    // addEventListener lets us listen for specific event types.
    // The server sends: event: order_placed\ndata: {...}\n\n
    // We register a handler for 'order_placed' and the browser dispatches it.

    eventSource.addEventListener('connected', function(e) {
      eventCount++;
      eventCountEl.textContent = eventCount;
      if (e.lastEventId) lastEventIdEl.textContent = e.lastEventId;
      const data = JSON.parse(e.data);
      addFeedEntry('CONNECTED', 'system', data.message || 'Stream ready');
      showRawEvent('connected', e.lastEventId, e.data);
    });

    eventSource.addEventListener('order_placed', function(e) {
      // A new order arrived! This is the event we care about most.
      // In a real restaurant, this would trigger an alert sound.
      eventCount++;
      eventCountEl.textContent = eventCount;
      if (e.lastEventId) lastEventIdEl.textContent = e.lastEventId;

      const order = JSON.parse(e.data);
      addOrUpdateOrderCard(order, true);

      const itemNames = (order.items || []).map(i => i.name).join(', ');
      addFeedEntry('ORDER', 'order',
        `New order #${order.order_id} from ${order.customer_name}: ${itemNames}`);
      showRawEvent('order_placed', e.lastEventId, e.data);
    });

    eventSource.addEventListener('status_changed', function(e) {
      // An order's status was updated.
      eventCount++;
      eventCountEl.textContent = eventCount;
      if (e.lastEventId) lastEventIdEl.textContent = e.lastEventId;

      const data = JSON.parse(e.data);
      updateOrderStatus(data.order_id, data.new_status);

      addFeedEntry('STATUS', 'status',
        `#${data.order_id}: ${data.old_status} -> ${data.new_status}`);
      showRawEvent('status_changed', e.lastEventId, e.data);
    });

    // The default 'message' event catches anything without an event: field.
    // We don't expect these, but handle them for completeness.
    eventSource.onmessage = function(e) {
      eventCount++;
      eventCountEl.textContent = eventCount;
      addFeedEntry('MSG', 'system', e.data);
    };
  }

  function disconnect() {
    if (eventSource) {
      eventSource.close();  // Close the SSE connection
      eventSource = null;
    }
    setConnectionState('disconnected');
    addFeedEntry('SYSTEM', 'system', 'Disconnected by user');
  }

  // ---- API calls (place orders, advance status) ----
  async function placeTestOrder() {
    const name = CUSTOMER_NAMES[Math.floor(Math.random() * CUSTOMER_NAMES.length)];
    const items = ITEM_COMBOS[Math.floor(Math.random() * ITEM_COMBOS.length)];

    try {
      const resp = await fetch('/orders', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          customer_name: name,
          restaurant_id: 'rest_01',
          item_ids: items,
        }),
      });

      if (!resp.ok) {
        addFeedEntry('ERROR', 'system', `Failed to place order: ${resp.status}`);
      }
      // The SSE stream will deliver the order_placed event — we don't
      // need to update the UI here. That's the point of SSE.
    } catch (err) {
      addFeedEntry('ERROR', 'system', `Error: ${err.message}`);
    }
  }

  async function advanceRandomOrder() {
    const orderIds = Object.keys(orders);
    if (orderIds.length === 0) {
      addFeedEntry('SYSTEM', 'system', 'No orders to advance');
      return;
    }

    // Pick an order that isn't delivered or cancelled
    const advanceable = orderIds.filter(id => {
      const s = orders[id].status;
      return s !== 'delivered' && s !== 'cancelled';
    });

    if (advanceable.length === 0) {
      addFeedEntry('SYSTEM', 'system', 'All orders are at terminal status');
      return;
    }

    const orderId = advanceable[Math.floor(Math.random() * advanceable.length)];

    try {
      const resp = await fetch(`/orders/${orderId}/advance`, { method: 'POST' });
      if (!resp.ok) {
        addFeedEntry('ERROR', 'system', `Failed to advance: ${resp.status}`);
      }
      // Again, the SSE stream delivers the status_changed event.
    } catch (err) {
      addFeedEntry('ERROR', 'system', `Error: ${err.message}`);
    }
  }

  // ---- Event listeners ----
  connectBtn.addEventListener('click', connect);
  placeOrderBtn.addEventListener('click', placeTestOrder);
  advanceBtn.addEventListener('click', advanceRandomOrder);

})();
</script>
</body>
</html>
